name: CI
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv && uv pip install -r requirements.txt -r requirements-dev.txt
      - run: . .venv/bin/activate && python -m py_compile src/*.py && pytest -q

  rn:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test -- --ci
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - run: cd android && ./gradlew assembleDebug
